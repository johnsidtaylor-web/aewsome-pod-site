name: Refresh feed data

on:
  schedule:
    - cron: "15 */4 * * *"
  workflow_dispatch: {}
  push:
    branches: [ main ]
    paths:
      - "scripts/**"
      - ".github/workflows/**"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch episodes
        run: python scripts/fetch_episodes.py
        continue-on-error: true

      - name: Fetch AEW news
        run: python scripts/fetch_news.py
        continue-on-error: true

      - name: Commit updated data
        run: |
          git config user.name  "aewsome-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/episodes.json data/news.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh feed data [skip ci]"
            git push
          fi
