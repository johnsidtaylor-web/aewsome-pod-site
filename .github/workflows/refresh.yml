name: Refresh feed data

on:
  schedule:
    # Runs at :15 past every hour (UTC). ~24 refreshes/day.
    # NOTE: GitHub schedules are best-effort and may lag or skip under load.
    - cron: "15 * * * *"
  workflow_dispatch: {}   # lets you trigger manually from the Actions tab
  push:
    branches: [ main ]
    paths:
      - "scripts/**"
      - ".github/workflows/**"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch episodes
        run: python scripts/fetch_episodes.py
        continue-on-error: true   # one feed failing shouldn't kill the run

      - name: Fetch AEW news
        run: python scripts/fetch_news.py
        continue-on-error: true

      - name: Commit updated data
        run: |
          git config user.name  "aewsome-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/episodes.json data/news.json
          if git diff --staged --quiet; then
            echo "No changes to commit — data identical to last run."
          else
            git commit -m "chore: refresh feed data [skip ci]"
            echo "Committed. Attempting push..."
            git push && echo "PUSH SUCCEEDED" || (echo "PUSH FAILED — check Settings > Actions > Workflow permissions (needs Read and write)"; exit 1)
          fi
